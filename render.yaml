services:
  - type: web
    name: vidwan-scheduler
    env: node
    plan: free
    buildCommand: "cd backend && npm install && cd ../frontend && npm install --legacy-peer-deps --include=dev && npm run build && cd .. && rm -rf backend/public && mkdir -p backend/public && cp -r frontend/dist/* backend/public/"
    startCommand: "cd backend && node src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # User will provide this in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
